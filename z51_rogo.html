<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
  <div style="color:red;font-size:50px;">
    <script language="JavaScript"> 
do {
  silnia_koniec=parseFloat(prompt("z czego silnia",""));
                                  }
                           while(silnia_koniec<0);
      if(silnia_koniec==0){silnia_rog=1;}
      else
      {var silnia_rog=1;
       for(i=1;i<=silnia_koniec;i++){
         silnia_rog=silnia_rog*i;
       }
      }
      document.write(silnia_koniec+"!="+silnia_rog);
</script>
  </div>
</body>
</html>
