<html lang="pl">
<head>
    <meta charset="utf-8">
    <title> Przykład użycia pętli </title>
    <script language="JavaScript">
        var a_rog = parseInt(prompt("ile razy powtórzyć=",""));
        var inicjaly_rog = prompt("podaj swoje inicjaly=","");
        document.write("<p style='color: red; font-size: 2cm;'> Rogowski </p>");
        document.write("<p style='color: blue; font-size: 5mm;'> Przykład użycia pętli </p>");
        for (var i_rog=1; i_rog<=a_rog; i_rog++){
            for (var k_rog=1; k_rog<=i_rog; k_rog++){
                document.write("&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp");
            }
            document.write(i_rog + "_" + inicjaly_rog + "_" + i_rog + "<br>");
        }
    </script>
</head>
<body>
</body>
</html>
