
<html>
<body>
<textarea cols="90" rows="35">
<html lang="pl">
<head>
    <meta charset="utf-8">
    <title> Przykład użycia pętli </title>
    <script language="JavaScript">
        var imie_rog = prompt("Podaj imię:");
        var nazwisko_rog = prompt("Podaj nazwisko:");

        var a_rog = (nazwisko_rog.length % 4) + 5;
        var b_rog = (imie_rog.length % 6) + 20;

        for (var j_rog = 1; j_rog <= b_rog; j_rog++) {
            document.write("*");
        }
        document.write("<br>");

        for (var i_rog = 1; i_rog <= a_rog - 2; i_rog++) {
            document.write("*");

            for (var j_rog = 1; j_rog <= b_rog - 2; j_rog++) {
                document.write("&nbsp;&nbsp;");
            }

            document.write("*<br>");
        }

        for (var j_rog = 1; j_rog <= b_rog; j_rog++) {
            document.write("*");
        }
        document.write("<br>");
    </script>
</head>
<body>
</body>
</html>
</textarea>
</body>
</html>
