
<html>
<body>
<textarea cols="90" rows="40">
<head>
<title>Sprawdzenie danych Rogowski </title>
<meta charset="utf-8">
</head>
<body>
    <div style="color:red;font-size:50px;">
        <script language="JavaScript">
            do {
                var liczba1=prompt("wysokość=","");
                var h_rog=parseFloat(liczba1);
            } while (h_rog<=0);
            do {
                var liczba1=prompt("podstawę=","");
                var a_rog=parseFloat(liczba1);
            } while(!(a_rog>0));
            var Pole=a_rog*h_rog/2;
            document.write("Pole="+Pole.toFixed(2)+" cm^2"+"<br>");
        </script>
    </div>
</body>
</html>

</textarea>
</body>
</html>
