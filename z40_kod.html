<body>

<script>
var x=prompt("podaj argument x=","");
var x_rog=parseFloat(x);

document.write("x="+x_rog+"<br>");

function f_rog(x_rog){
if(x_rog>=1){return 1;}
else if(x_rog>=-2 && x_rog<1){return x_rog*x_rog;}
else{return 4;}
}

document.write("f="+f_rog(x_rog).toFixed(2));
</script>

</body>
