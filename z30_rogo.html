<html>
 <head>
 <script type="text/javascript">
var wazon = {
        kolor: 'Niebieski',
        material: 'Ceramika',
        wysokosc: '30 cm',
        wazon_wyswietl_rogowski: function() {
            document.write(this.kolor + ' ' + this.material + ' ' + this.wysokosc)
        }
    }
  wazon.wazon_wyswietl_rogowski();
 </script>
 </head>
<body>
<br>
 Programowanie obiektowe. <br>
 Obiekt to wazon<br>
 Pola:<br>
 koloro<br>
 material<br>
 wysokosc<br>
 metoda: wazon_wyswietl_rogowski<br>
</body>
</html>
